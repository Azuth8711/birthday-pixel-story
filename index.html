const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const SUB    = document.getElementById('subtitle');
const W = 640, H = 360;
const PX = 2; // 像素格大小

// ===== 工具函数 =====
function r(x,y,w,h,color) {
  ctx.fillStyle = color;
  // 对齐到像素格
  const gx = Math.round(x/PX)*PX;
  const gy = Math.round(y/PX)*PX;
  const gw = Math.round(w/PX)*PX;
  const gh = Math.round(h/PX)*PX;
  ctx.fillRect(gx, gy, gw, gh);
}

// 绘制圆形人脸（带像素化边缘效果）
function drawFace(key, cx, cy, size) {
  const img = FACES[key];
  if (!img || !img.complete) return;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, size/2, 0, Math.PI*2);
  ctx.clip();
  ctx.drawImage(img, cx - size/2, cy - size/2, size, size);
  ctx.restore();
  // 像素化金色边框
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = PX*2;
  ctx.beginPath();
  ctx.arc(cx, cy, size/2 + PX, 0, Math.PI*2);
  ctx.stroke();
}

// 绘制像素字体（大号）
function pixelText(text, x, y, color, size) {
  ctx.fillStyle = color;
  ctx.font = `bold ${size || 20}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(text, x, y);
}

// 绘制星星/烟花粒子
function drawStar(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x/PX)*PX, Math.round(y/PX)*PX, PX*2, PX*2);
}

// 闪烁效果
function flicker(t, period) { return Math.sin(t * Math.PI * 2 / period) > 0; }

// ===== 场景绘制函数 =====

// 镜头1：城堡远景（0~2s）
function scene01(t) {
  const p = Math.min(t/2, 1);
  // 天空：紫色渐变
  const skyGrad = ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0, '#2d0050');
  skyGrad.addColorStop(1, '#6a0080');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // 远山色块
  r(0, 220, 640, 20, '#3a0060');
  r(0, 235, 640, 20, '#4a006a');

  // 地面
  r(0, 250, W, 110, '#1a0030');

  // 城堡主体（梯形剪影）
  r(220, 150, 200, 110, '#555577');
  // 城墙锯齿
  for(let i=0;i<8;i++) {
    r(220+i*26, 138, 14, 16, '#555577');
  }
  // 中央高塔
  r(290, 80, 60, 80, '#666688');
  for(let i=0;i<3;i++) {
    r(290+i*22, 68, 14, 16, '#666688');
  }
  // 塔尖
  r(315, 50, 10, 34, '#cc3344');

  // 城堡门洞
  r(298, 210, 44, 50, '#110022');
  r(298+4, 192, 36, 22, '#110022'); // 圆弧顶部

  // 旗帜飘动
  const flagX = 319;
  const flagY = 50;
  const wave = Math.sin(t * 3) * 4;
  r(flagX, flagY, 2, 28, '#888899');
  // 旗面
  ctx.fillStyle = '#ff4455';
  ctx.beginPath();
  ctx.moveTo(flagX+2, flagY);
  ctx.lineTo(flagX+20, flagY+4+wave);
  ctx.lineTo(flagX+2, flagY+12);
  ctx.closePath();
  ctx.fill();

  // 窗户（发光）
  const winAlpha = 0.7 + Math.sin(t*4)*0.3;
  ctx.fillStyle = `rgba(255,200,50,${winAlpha})`;
  ctx.fillRect(340, 110, 8, 10);
  ctx.fillRect(252, 130, 8, 10);

  // 标题淡入
  if(p > 0.3) {
    ctx.globalAlpha = Math.min((p-0.3)/0.4, 1);
    pixelText('★ 像素奇幻故事 ★', W/2, 40, '#ffd700', 22);
    ctx.globalAlpha = 1;
  }

  SUB.textContent = '古老城堡，传说之地...';
}

// 镜头2：公主特写（2~5s）
function scene02(t) {
  // 石墙背景
  for(let row=0; row<H; row+=20) {
    for(let col=0; col<W; col+=40) {
      const c = (row+col)%80===0 ? '#3a3a55' : '#2a2a44';
      r(col, row, 40, 20, c);
      r(col, row, 40, 1, '#111122');
    }
  }
  r(0, 0, W, H/3, '#1a1a33'); // 顶部暗

  // 窗户石框
  r(W/2-60, 60, 120, 180, '#44445a');
  r(W/2-55, 65, 110, 170, '#88aacc'); // 天空色
  r(W/2-55, 65, 110, 5, '#aaccee');   // 天光
  // 石栏
  r(W/2-55, 220, 110, 14, '#55556a');
  r(W/2-55, 230, 14, 30, '#55556a');
  r(W/2+41, 230, 14, 30, '#55556a');

  // 裙摆（华丽像素）
  const dressColors = ['#cc2244','#dd3355','#ee4466','#cc2244'];
  for(let i=0;i<14;i++) {
    const w2 = 20+i*6;
    r(W/2-w2/2, 280+i*4, w2, 6, dressColors[i%4]);
  }
  // 衣身
  r(W/2-18, 220, 36, 65, '#dd3355');
  r(W/2-22, 210, 44, 20, '#ee4466'); // 胸部

  // 发丝飘动
  const hairY = 130 + Math.sin(t*2)*2;
  r(W/2-26, hairY, 52, 30, '#3a1a0a'); // 头发
  r(W/2-28, hairY+5, 56, 15, '#4a2010');
  // 发丝飘逸
  for(let i=0; i<5; i++) {
    const fy = hairY + 20 + Math.sin(t*2 + i) * 3;
    r(W/2+20+i*4, fy, 4, 16+i*4, '#3a1a0a');
  }

  // 手臂
  r(W/2-32, 230, 14, 50, '#f0b080'); // 左臂
  r(W/2+18, 230, 14, 50, '#f0b080'); // 右臂

  // 脸部（换脸）
  drawFace('princess', W/2, 170, 88);

  // 眺望动作（手放额前）
  r(W/2+14, 200, 20, 8, '#f0b080');

  // 光晕
  ctx.save();
  const grad = ctx.createRadialGradient(W/2, 170, 20, W/2, 170, 80);
  grad.addColorStop(0, 'rgba(255,220,100,0.15)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(W/2-80, 110, 160, 160);
  ctx.restore();

  SUB.textContent = '公主凝望远方——';
}

// 镜头3：骑士远景（5~7s）
function scene03(t) {
  const prog = Math.min(t/2, 1);
  // 绿色平原背景
  const skyGrad = ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0, '#4488cc');
  skyGrad.addColorStop(0.6, '#88bbee');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,W,H);

  // 远处城堡剪影（右侧）
  r(460, 100, 100, 160, '#445566');
  r(480, 75, 30, 40, '#556677');
  r(494, 60, 6, 20, '#885566');

  // 草地
  r(0, 240, W, H-240, '#336622');
  r(0, 240, W, 10, '#448833');
  r(0, 250, W, 8, '#44aa44');

  // 草丛装饰
  for(let i=0; i<20; i++) {
    r(i*34, 238, 4, 8, '#55bb44');
    r(i*34+10, 240, 4, 6, '#44aa33');
  }

  // 远处小山
  for(let i=0;i<3;i++) {
    r(60+i*120, 190, 100, 55, '#44883a'+Math.floor((i+1)*30).toString(16));
  }

  // 道路
  r(0, 270, W, 30, '#998866');
  r(0, 275, W, 6, '#bbaa77');

  // 骑士+马（剪影，从左向右，向城堡行进）
  const kx = 80 + prog * 240;
  const bounce = Math.sin(t * 8) * 3;

  // 马（剪影色块）
  r(kx, 248+bounce, 54, 28, '#443322'); // 马身
  r(kx+44, 243+bounce, 20, 22, '#443322'); // 马头颈（朝右）
  r(kx+54, 248+bounce, 14, 12, '#443322'); // 马嘴
  // 马腿
  const legOff = Math.sin(t*8)*6;
  r(kx+6, 272+bounce, 8, 16+legOff, '#332211');
  r(kx+16, 272+bounce, 8, 16-legOff, '#332211');
  r(kx+32, 272+bounce, 8, 16+legOff, '#332211');
  r(kx+42, 272+bounce, 8, 16-legOff, '#332211');
  // 马头像（远景小圆形，贴在马头颈处）
  drawFace('horse', kx+56, 242+bounce, 28);
  // 骑士（剪影）
  r(kx+10, 228+bounce, 28, 26, '#334455'); // 身体
  r(kx+16, 210+bounce, 16, 22, '#334455'); // 头+盔

  // 猪仔跟跑（稍落后）
  const px2 = kx - 40 + Math.sin(t*8)*2;
  const pBounce = Math.sin(t*10+1)*2;
  r(px2, 270+pBounce, 24, 16, '#ffbbaa'); // 猪身
  r(px2+16, 268+pBounce, 14, 12, '#ffbbaa'); // 猪头（朝右）
  r(px2+28, 272+pBounce, 8, 6, '#ffbbaa'); // 猪嘴
  r(px2+2, 282+pBounce, 6, 8, '#ffbbaa'); // 腿
  r(px2+16, 282+pBounce, 6, 8, '#ffbbaa');

  // 尘土
  for(let i=0;i<3;i++) {
    const da = 0.3 - (i*0.08) + Math.sin(t*5+i)*0.1;
    ctx.fillStyle = `rgba(180,160,100,${da})`;
    ctx.fillRect(kx-i*18-10, 278, 18, 10);
  }

  SUB.textContent = '骑士携宠物猪仔，策马奔赴城堡...';
}

// 镜头4：骑士+猪仔特写（7~10s）
function scene04(t) {
  // 背景（蓝天）
  r(0, 0, W, H*0.65, '#5599dd');
  r(0, H*0.65, W, H*0.35, '#556633');
  // 云
  r(50, 40, 80, 20, '#eef8ff');
  r(60, 30, 60, 22, '#eef8ff');
  r(400, 60, 60, 16, '#eef8ff');
  r(408, 50, 44, 18, '#eef8ff');

  // 马（局部，下方露出马背）
  r(180, 290, W-140, 80, '#443322');
  r(200, 270, 240, 40, '#554433');

  // 骑士身体（银甲）
  const armAnim = Math.sin(t*2)*3;
  r(W/2-50, 200, 100, 120, '#aabbcc'); // 铠甲胸
  r(W/2-60, 210, 20, 80, '#9aabbc'); // 左臂
  r(W/2+40, 210+armAnim, 20, 80, '#9aabbc'); // 右臂（轻动）
  // 铠甲纹路
  r(W/2-40, 220, 80, 4, '#8899aa');
  r(W/2-35, 240, 70, 4, '#8899aa');
  r(W/2-30, 260, 60, 4, '#8899aa');
  // 肩膀
  r(W/2-65, 195, 30, 20, '#bbccdd');
  r(W/2+35, 195, 30, 20, '#bbccdd');

  // 骑士脸（换脸）
  drawFace('knight', W/2, 155, 100);

  // 骑士头盔（只露下半）
  r(W/2-48, 110, 96, 50, '#aabbcc');
  r(W/2-50, 100, 100, 20, '#aabbcc');
  // 头盔羽毛
  for(let i=0;i<5;i++) {
    r(W/2-10+i*6, 80+Math.sin(t*3+i)*3, 4, 22, i%2===0?'#ff4444':'#ffcc00');
  }
  // 眼缝（头盔）
  r(W/2-44, 125, 38, 8, '#334455');
  r(W/2+6, 125, 38, 8, '#334455');

  // 猪仔（仰头看骑士，在右下角）
  const pigX = W/2+100;
  const pigY = 260;
  const pigBounce = Math.sin(t*5)*3;
  r(pigX, pigY+pigBounce, 70, 48, '#ffccaa');
  r(pigX+48, pigY-8+pigBounce, 38, 34, '#ffccaa'); // 猪头（朝左，看骑士）
  r(pigX+36, pigY+8+pigBounce, 18, 12, '#ffccaa'); // 猪嘴
  r(pigX+50, pigY-6+pigBounce, 10, 10, '#ffaaaa'); // 耳
  r(pigX+72, pigY-6+pigBounce, 10, 10, '#ffaaaa');
  r(pigX+58, pigY-2+pigBounce, 8, 6, '#cc8888'); // 猪鼻

  // 仰头效果（猪的眼睛看上方）
  r(pigX+52, pigY+2+pigBounce, 6, 6, '#2a1a0a');
  r(pigX+66, pigY+2+pigBounce, 6, 6, '#2a1a0a');

  // 猪仔脸（换脸，小圆形）
  drawFace('pig', pigX+20, pigY+20+pigBounce, 46);

  // 对视连线（心形粒子）
  if(t > 1.5) {
    const heartAlpha = Math.min((t-1.5)/0.5, 1);
    ctx.globalAlpha = heartAlpha * (0.7 + Math.sin(t*4)*0.3);
    pixelText('♥', W/2+70, 195, '#ff88aa', 24);
    ctx.globalAlpha = 1;
  }

  SUB.textContent = '骑士眼神坚定，猪仔仰头崇拜...';
}

// 镜头5：黑龙飞来（10~12s）
function scene05(t) {
  const prog = Math.min(t/2, 1);
  // 天色骤变暗红
  const skyR = Math.floor(50 + prog*100);
  const skyG = Math.floor(10 + prog*5);
  r(0, 0, W, H*0.7, `rgb(${skyR},${skyG},0)`);
  r(0, H*0.7, W, H*0.3, '#222200');

  // 远处火山剪影（黑色三角形）
  ctx.fillStyle = '#110000';
  ctx.beginPath();
  ctx.moveTo(120, H);
  ctx.lineTo(220, 120);
  ctx.lineTo(320, H);
  ctx.closePath();
  ctx.fill();
  // 火山口烟雾
  for(let i=0;i<4;i++) {
    const smokeY = 100 - i*20 - prog*20;
    const smokeA = 0.4 - i*0.08;
    ctx.fillStyle = `rgba(80,40,0,${smokeA})`;
    ctx.fillRect(190+i*6, smokeY, 30-i*4, 20);
  }

  // 火山口火光
  if(flicker(t, 0.15)) {
    r(200, 115, 40, 10, '#ff4400');
    r(205, 108, 30, 10, '#ff6600');
  }

  // 远处城堡（右边，蒙上暗色）
  r(480, 120, 120, 180, '#221122');
  r(500, 95, 40, 40, '#332233');
  r(514, 78, 8, 22, '#552244');

  // 黑龙（从火山方向腾空，放大压向画面）
  const dragonScale = 0.15 + prog * 1.2;
  const dragonX = W/2 - dragonScale*60;
  const dragonY = 60 - prog*40;
  const ds = dragonScale;

  ctx.save();
  ctx.translate(dragonX + ds*60, dragonY + ds*40);
  ctx.scale(ds, ds);

  // 龙身
  ctx.fillStyle = '#111111';
  ctx.fillRect(-60, -30, 120, 55);
  ctx.fillRect(-40, 20, 80, 30); // 腹部
  // 龙头
  ctx.fillRect(60, -40, 60, 45);
  ctx.fillRect(100, -45, 30, 55); // 嘴
  ctx.fillStyle = '#ff2200';
  ctx.fillRect(105, -15, 25, 8); // 火焰眼
  // 翅膀（展开）
  ctx.fillStyle = '#1a0000';
  ctx.beginPath();
  ctx.moveTo(-60, -20);
  ctx.lineTo(-160 - Math.sin(t*6)*20, -100);
  ctx.lineTo(-120, 10);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(60, -20);
  ctx.lineTo(160 + Math.sin(t*6)*20, -100);
  ctx.lineTo(120, 10);
  ctx.closePath();
  ctx.fill();
  // 龙爪
  ctx.fillStyle = '#111111';
  ctx.fillRect(-40, 45, 16, 25);
  ctx.fillRect(24, 45, 16, 25);

  ctx.restore();

  // 冲击光效
  if(prog > 0.7) {
    ctx.fillStyle = `rgba(200,0,0,${(prog-0.7)*0.5})`;
    ctx.fillRect(0, 0, W, H);
  }

  // 闪电
  if(flicker(t*2, 0.2)) {
    ctx.strokeStyle = '#ffff88';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(200, 0);
    ctx.lineTo(220, 60);
    ctx.lineTo(200, 60);
    ctx.lineTo(230, 140);
    ctx.stroke();
  }

  SUB.textContent = '天色骤变——黑龙腾空而起！';
}

// 镜头6：龙爪抓走公主（12~15s）
function scene06(t) {
  const prog = Math.min(t/3, 1);
  // 石墙背景（塔楼内）
  for(let row=0; row<H; row+=20) {
    for(let col=0; col<W; col+=40) {
      r(col, row, 40, 20, '#2a2a44');
      r(col, row, 40, 1, '#111122');
    }
  }
  // 红色警示光
  const danger = Math.sin(t*6)*0.15 + 0.2;
  ctx.fillStyle = `rgba(200,0,0,${danger})`;
  ctx.fillRect(0,0,W,H);

  // 公主（逐渐被抓起）
  const princessY = 150 + Math.min(t*30, 80) * (-1); // 向上移动
  const princessShake = t < 2 ? Math.sin(t*20)*4 : 0;

  // 裙摆
  for(let i=0;i<10;i++) {
    const flyUp = Math.min(t*40, 60);
    r(W/2-20+i*4-flyUp*0.2, princessY+80+i*5, 40-i*2, 8,
      ['#cc2244','#dd3355','#ee4466','#cc2244'][i%4]);
  }
  // 衣身
  r(W/2-16, princessY+40, 32, 50, '#dd3355');
  r(W/2-20, princessY+30, 40, 20, '#ee4466');
  // 手臂（伸出呼救）
  r(W/2-44, princessY+30, 14, 50, '#f0b080'); // 左臂（伸出）
  r(W/2-60, princessY+20, 20, 14, '#f0b080'); // 左手伸展
  r(W/2+30, princessY+30, 14, 40, '#f0b080');

  // 公主脸
  drawFace('princess', W/2 + princessShake, princessY + 10, 80);

  // 惊恐表情（嘴巴大开的O字）
  ctx.fillStyle = '#cc0000';
  ctx.fillRect(W/2-10+princessShake, princessY+26, 20, 14); // 大O嘴
  ctx.fillStyle = '#ffaaaa';
  ctx.fillRect(W/2-6+princessShake, princessY+28, 12, 10);

  // 呼救文字
  if(t > 0.5) {
    const cryAlpha = Math.min((t-0.5)/0.3, 1) * (0.8+Math.sin(t*5)*0.2);
    ctx.globalAlpha = cryAlpha;
    pixelText('救命！', W/2-60, princessY-10, '#ffff00', 20);
    ctx.globalAlpha = 1;
  }

  // 龙爪从顶部砸入
  const clawY = Math.max(-60, -60 + prog * (H*0.3));
  ctx.fillStyle = '#111111';
  // 爪臂
  r(W/2-20, 0, 40, clawY + 60, '#110000');
  // 爪子
  ctx.fillStyle = '#111111';
  const cx2 = W/2;
  const cy2 = clawY + 60;
  // 三根爪指
  for(let i=-1; i<=1; i++) {
    r(cx2+i*20-8, cy2, 12, 40, '#111111');
    r(cx2+i*20-12, cy2+34, 6, 16, '#223322'); // 爪尖（深绿）
  }
  // 爪手掌
  r(cx2-30, cy2-10, 60, 30, '#111111');

  // 如果抓住了（prog>0.6），公主往上移
  if(prog > 0.6) {
    const liftProg = (prog-0.6)/0.4;
    ctx.fillStyle = `rgba(0,0,0,${liftProg*0.7})`;
    ctx.fillRect(0,0,W,H);
    // 消失光效
    const glowR = 100 + liftProg*100;
    ctx.fillStyle = `rgba(200,50,50,${liftProg*0.4})`;
    ctx.beginPath();
    ctx.arc(W/2, princessY+10, glowR, 0, Math.PI*2);
    ctx.fill();
  }

  SUB.textContent = prog < 0.6 ? '龙爪突然砸下——！' : '公主被抓走了！';
}

// 镜头7：猪仔惊慌（15~16.5s）
function scene07(t) {
  // 绿草地背景
  r(0, 0, W, H*0.55, '#5599cc');
  r(0, H*0.55, W, H*0.45, '#336622');
  r(0, H*0.55, W, 12, '#44aa44');

  // 猪仔居中，原地转圈
  const spinAngle = t * 5;
  const cx2 = W/2 + Math.cos(spinAngle) * 20;
  const cy2 = H/2 + Math.sin(spinAngle) * 8;
  const pigBounce = Math.abs(Math.sin(t*8)) * 6;

  // 猪身
  r(cx2-30, cy2-10+pigBounce, 60, 40, '#ffccaa');
  // 猪头（方向跟随旋转）
  const headDir = Math.cos(spinAngle) > 0 ? 1 : -1;
  r(cx2 + headDir*26, cy2-16+pigBounce, 36, 30, '#ffccaa');
  r(cx2 + headDir*38, cy2-8+pigBounce, 16, 12, '#ffccaa'); // 嘴
  r(cx2 + headDir*28, cy2-18+pigBounce, 12, 10, '#ffaaaa'); // 耳
  r(cx2 + headDir*40, cy2-6+pigBounce, 8, 6, '#cc8888'); // 鼻

  // 猪仔脸
  drawFace('pig', cx2, cy2+pigBounce, 52);

  // 汗水符号
  for(let i=0;i<3;i++) {
    const sweatX = cx2 + 30 + i*18 + Math.sin(t*3+i)*5;
    const sweatY = cy2 - 30 + i*8;
    ctx.fillStyle = '#88ddff';
    ctx.fillRect(Math.round(sweatX/PX)*PX, Math.round(sweatY/PX)*PX, 6, 10);
    ctx.fillRect(Math.round((sweatX+2)/PX)*PX, Math.round((sweatY+8)/PX)*PX, 10, 6);
  }

  // 眼珠乱转
  ctx.fillStyle = '#ff3300';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('！？！', cx2, cy2-50+pigBounce);

  // 问号符号飘出
  const qX = cx2-50 + Math.sin(t*2)*10;
  const qY = cy2-60 - t*10;
  ctx.globalAlpha = Math.max(0, 1-t*0.5);
  pixelText('？', qX, qY, '#ffff00', 22);
  ctx.globalAlpha = 1;

  SUB.textContent = '猪仔：???  !!!  转圈.jpg';
}

// 镜头8：骑士举枪（16.5~19.5s）
function scene08(t) {
  const prog = Math.min(t/3, 1);
  // 第一阶段(0~1.2s)：骑士眼神特写
  if(t < 1.2) {
    const ep = t/1.2;
    // 黑色背景
    r(0, 0, W, H, '#0a0a1a');
    // 聚光灯
    const grad = ctx.createRadialGradient(W/2, H/2-20, 0, W/2, H/2-20, 160);
    grad.addColorStop(0, 'rgba(100,140,180,0.3)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // 只有骑士脸的特写（超大）
    drawFace('knight', W/2, H/2-10, 200);
    // 头盔遮住大部分
    r(W/2-100, H/2-120, 200, 80, '#aabbcc');
    r(W/2-100, H/2-100, 200, 30, '#aabbcc');
    // 眼缝（露出眼睛）
    r(W/2-80, H/2-40, 60, 18, '#aabbcc');
    r(W/2+20, H/2-40, 60, 18, '#aabbcc');

    // 眼神光
    if(ep > 0.3) {
      ctx.globalAlpha = Math.min((ep-0.3)/0.3, 1);
      r(W/2-60, H/2-34, 40, 6, '#88ccff');
      r(W/2+28, H/2-34, 40, 6, '#88ccff');
      ctx.globalAlpha = 1;
    }

    SUB.textContent = '骑士的眼神...';
  } else {
    // 第二阶段(1.2s~3s)：全身举枪
    const t2 = t - 1.2;
    const p2 = Math.min(t2/1.8, 1);

    // 背景（暗红天空+草地）
    r(0, 0, W, H*0.65, '#331122');
    r(0, H*0.65, W, H*0.35, '#225511');

    // 骑士全身
    // 腿部（坐马上）
    r(W/2-50, 280, 100, 60, '#556677');
    // 铠甲身
    r(W/2-44, 190, 88, 100, '#aabbcc');
    r(W/2-50, 180, 100, 20, '#bbccdd');
    // 手臂举起
    const armUp = -80 * p2;
    r(W/2-60, 200+armUp, 20, 80+armUp*0.5, '#9aabbc'); // 左臂举起
    r(W/2+40, 200, 20, 70, '#9aabbc'); // 右臂平

    // 骑士脸
    drawFace('knight', W/2, 148, 88);
    // 头盔
    r(W/2-44, 108, 88, 50, '#aabbcc');
    r(W/2-46, 100, 92, 18, '#aabbcc');

    // 长枪
    const spearRotate = -1.2 + p2 * 1.0; // 从斜下到垂直偏前
    ctx.save();
    ctx.translate(W/2-44, 200+armUp+10);
    ctx.rotate(spearRotate);
    // 枪杆
    ctx.fillStyle = '#885533';
    ctx.fillRect(-4, -120, 8, 140);
    // 枪尖
    ctx.fillStyle = '#ddddaa';
    ctx.fillRect(-4, -140, 8, 24);
    // 枪尖蓄力光
    if(p2 > 0.5) {
      const glowAlpha = (p2-0.5)/0.5;
      const glowSize = 10 + glowAlpha * 20;
      ctx.fillStyle = `rgba(255,220,50,${glowAlpha*0.7})`;
      ctx.beginPath();
      ctx.arc(0, -140, glowSize, 0, Math.PI*2);
      ctx.fill();
      // 光芒射线
      for(let i=0;i<6;i++) {
        const ra = (i/6)*Math.PI*2;
        ctx.fillStyle = `rgba(255,220,50,${glowAlpha*0.5})`;
        ctx.fillRect(
          Math.cos(ra)*(glowSize+5)-2, -140+Math.sin(ra)*(glowSize+5)-2,
          4, glowSize
        );
      }
    }
    ctx.restore();

    // 深吸一口气效果（胸膛扩张）
    if(p2 > 0.7) {
      const breathe = Math.sin(t2*3)*3;
      r(W/2-46, 188+breathe, 92, 8, '#ccddee');
    }

    SUB.textContent = p2 < 0.7 ? '骑士缓缓举起长枪...' : '枪尖金光蓄力，深吸一口气——';
  }
}

// 镜头9：投枪命中（19.5~21.5s）
function scene09(t) {
  const prog = Math.min(t/2, 1);
  // 暗红天空
  r(0, 0, W, H, '#220000');

  // 黑龙（上方，抓着公主）
  const dragonY = 40 + Math.sin(t*2)*10;
  r(W/2-80, dragonY, 160, 70, '#111111'); // 龙身
  r(W/2+60, dragonY-20, 80, 55, '#111111'); // 龙头朝右
  // 龙翅
  ctx.fillStyle = '#1a0000';
  ctx.beginPath();
  ctx.moveTo(W/2-80, dragonY+10);
  ctx.lineTo(W/2-200, dragonY-60);
  ctx.lineTo(W/2-60, dragonY+40);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(W/2+80, dragonY+10);
  ctx.lineTo(W/2+200, dragonY-60);
  ctx.lineTo(W/2+60, dragonY+40);
  ctx.closePath();
  ctx.fill();
  // 龙爪抓公主
  r(W/2-20, dragonY+55, 40, 30, '#111111');
  // 公主（被抓着，缩小版）
  drawFace('princess', W/2, dragonY+100, 36);
  r(W/2-12, dragonY+118, 24, 30, '#dd3355');

  // 长枪飞出（金色弧线）
  if(prog < 0.6) {
    const spearProg = prog / 0.6;
    const sx = 60 + spearProg * (W/2-60);
    const sy = H-100 - spearProg * (H-100-dragonY-30);
    // 枪身
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx-20, sy+30);
    ctx.stroke();
    // 枪尖光
    ctx.fillStyle = '#ffffaa';
    ctx.fillRect(sx-4, sy-4, 8, 8);
    // 轨迹
    for(let i=1;i<5;i++) {
      const tx2 = sx - i*15;
      const ty = sy + i*20;
      ctx.globalAlpha = 0.3 - i*0.06;
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(tx2-2, ty-2, 6, 6);
      ctx.globalAlpha = 1;
    }
  } else {
    // 命中！
    const hitProg = (prog-0.6)/0.4;
    // 爆炸光效
    const expR = hitProg * 100;
    ctx.fillStyle = `rgba(255,150,0,${0.8-hitProg*0.7})`;
    ctx.beginPath();
    ctx.arc(W/2+40, dragonY+30, expR, 0, Math.PI*2);
    ctx.fill();
    // 碎片
    for(let i=0;i<8;i++) {
      const ang = (i/8)*Math.PI*2 + t;
      const rd = hitProg * 80;
      r(W/2+40+Math.cos(ang)*rd, dragonY+30+Math.sin(ang)*rd, 8, 8, '#ff6600');
    }
    // 龙身震动
    const shake = Math.sin(t*20)*4*(1-hitProg);
    r(W/2-80+shake, dragonY, 160, 70, '#1a0000');

    // 龙爪松开
    if(hitProg > 0.6) {
      const openClaw = (hitProg-0.6)/0.4;
      ctx.globalAlpha = 1-openClaw;
      r(W/2-20, dragonY+55, 40, 30, '#111111');
      ctx.globalAlpha = 1;
    }
  }

  SUB.textContent = prog < 0.6 ? '长枪划出金色弧线——' : '正中！龙爪松开！';
}

// 镜头10：公主坠落+骑士接人（21.5~25.5s）
function scene10(t) {
  const prog = Math.min(t/4, 1);
  // 暗红转蓝（情感高潮）
  const skyR = Math.floor(80 - prog*40);
  const skyB = Math.floor(20 + prog*120);
  r(0, 0, W, H*0.7, `rgb(${skyR},0,${skyB})`);
  r(0, H*0.7, W, H*0.3, '#334422');

  // 公主坠落（prog 0~0.4）
  if(prog < 0.4) {
    const fallP = prog/0.4;
    const pY = -50 + fallP * (H*0.3+50);
    // 裙摆飘起
    for(let i=0;i<8;i++) {
      r(W/2-20+i*6, pY+60+i*4-40*(1-fallP), 34-i*2, 8,
        ['#cc2244','#dd3355','#ee4466'][i%3]);
    }
    r(W/2-14, pY+30, 28, 40, '#dd3355');
    drawFace('princess', W/2, pY, 70);
  }

  // 战马腾跃（prog 0.2~0.5）
  if(prog > 0.2 && prog < 0.7) {
    const jp = (prog-0.2)/0.5;
    const horseY = H*0.7 - jp*jp*200;
    // 马（横向跳跃）
    r(W/2-80, horseY-20, 120, 50, '#443322');
    r(W/2+30, horseY-35, 50, 40, '#443322'); // 马头
    r(W/2+66, horseY-40, 24, 20, '#443322');
    // 马头像（贴在马头处）
    drawFace('horse', W/2+54, horseY-22, 40);
    // 马腿腾空
    for(let i=0;i<4;i++) {
      r(W/2-70+i*26, horseY+28, 12, 20+Math.sin(jp*Math.PI+i)*15, '#332211');
    }
    // 骑士站马背
    r(W/2-30, horseY-80, 60, 70, '#aabbcc');
    drawFace('knight', W/2, horseY-100, 60);
    // 骑士跃起动作（双臂张开）
    r(W/2-70, horseY-70, 40, 12, '#9aabbc');
    r(W/2+30, horseY-70, 40, 12, '#9aabbc');
  }

  // 相撞接住（prog 0.45~0.7）
  if(prog > 0.45 && prog < 0.7) {
    const cp = (prog-0.45)/0.25;
    // 金色光晕
    const glowR = cp * 150;
    const glowA = 0.6 - cp*0.5;
    ctx.fillStyle = `rgba(255,220,50,${glowA})`;
    ctx.beginPath();
    ctx.arc(W/2, H*0.35, glowR, 0, Math.PI*2);
    ctx.fill();
  }

  // 定格特写（prog 0.55~1.0）：相拥对视
  if(prog > 0.55) {
    const sp = Math.min((prog-0.55)/0.2, 1);
    r(0, 0, W, H, '#0a0a22');

    // 金色背景光
    const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 200);
    bgGrad.addColorStop(0, 'rgba(255,220,100,0.25)');
    bgGrad.addColorStop(1, 'rgba(0,0,10,0)');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0,0,W,H);

    ctx.globalAlpha = sp;

    // 骑士（左侧，面朝右）
    r(W/2-160, H/2-80, 80, 120, '#aabbcc'); // 铠甲
    r(W/2-140, H/2-60, 60, 30, '#aabbcc');  // 手臂（环抱）
    drawFace('knight', W/2-110, H/2-100, 100);
    r(W/2-154, H/2-145, 92, 55, '#aabbcc'); // 头盔

    // 公主（右侧，面朝左）
    r(W/2+80, H/2-80, 80, 120, '#dd3355');  // 裙
    r(W/2+60, H/2-60, 60, 30, '#dd3355');   // 手臂（环抱）
    drawFace('princess', W/2+110, H/2-100, 100);
    // 发丝
    for(let i=0;i<4;i++) {
      r(W/2+90-i*5, H/2-155+i*8, 8, 30, '#3a1a0a');
    }

    // 猪仔在旁边跳跃庆祝
    const pigJ = Math.abs(Math.sin(t*6))*20;
    drawFace('pig', W/2+10, H/2+50-pigJ, 44);
    r(W/2-10, H/2+70-pigJ, 40, 30, '#ffccaa');

    // 心形
    ctx.fillStyle = '#ff88aa';
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('♥', W/2, H/2-60);

    ctx.globalAlpha = 1;

    SUB.textContent = '相拥，对视 ♥';
  } else {
    SUB.textContent = prog < 0.4 ? '公主坠落——' : '战马腾跃，骑士奋身接人！';
  }
}

// 镜头11：烟花结局（25.5~37s）
function scene11(t) {
  // 城堡夜景
  r(0, 0, W, H, '#03050a');
  // 星空
  const stars = [
    [40,30],[120,20],[200,50],[300,25],[400,40],[500,15],[580,35],
    [80,80],[160,65],[350,70],[450,55],[540,75],[620,60],
    [30,120],[250,100],[480,90],[600,110]
  ];
  stars.forEach(([sx,sy]) => {
    const twinkle = Math.sin(t*2+sx*0.1+sy*0.05) > 0.3;
    if(twinkle) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(Math.round(sx/PX)*PX, Math.round(sy/PX)*PX, PX, PX);
    }
  });

  // 城堡剪影
  r(180, 180, 280, 180, '#1a1a33');
  r(200, 150, 240, 40, '#222244'); // 城墙
  for(let i=0;i<8;i++) r(200+i*32, 138, 14, 16, '#222244');
  r(280, 100, 80, 90, '#2a2a44'); // 主塔
  for(let i=0;i<3;i++) r(280+i*28, 86, 14, 18, '#2a2a44');
  r(315, 68, 10, 24, '#cc3344'); // 旗杆+旗
  // 城堡窗灯
  ctx.fillStyle = '#ffcc66';
  ctx.fillRect(300, 130, 10, 12);
  ctx.fillRect(338, 130, 10, 12);
  ctx.fillRect(316, 110, 8, 10);
  // 月亮
  r(560, 30, 40, 40, '#eeddaa');
  r(566, 34, 28, 32, '#03050a'); // 月牙效果

  // 地面草地暗影
  r(0, 320, W, 40, '#0d1a0d');
  r(0, 315, W, 8, '#162a16');

  // 烟花系统
  const fireworks = [
    {cx:150, cy:80,  colors:['#ff4455','#ff8866','#ffcc44'], baseT:0},
    {cx:350, cy:60,  colors:['#44ffcc','#4488ff','#aaffcc'], baseT:0.8},
    {cx:520, cy:90,  colors:['#ffaaff','#ff66ff','#ffddff'], baseT:1.6},
    {cx:240, cy:100, colors:['#ffdd44','#ffff88','#ffffff'], baseT:2.4},
    {cx:450, cy:70,  colors:['#44ddff','#88aaff','#aaddff'], baseT:3.2},
    {cx:130, cy:110, colors:['#ff6644','#ffaa88','#ffddcc'], baseT:4.0},
    {cx:400, cy:50,  colors:['#aaff44','#ccff88','#eeffcc'], baseT:4.8},
  ];

  fireworks.forEach(fw => {
    const ft = (t - fw.baseT) % 6;
    if(ft < 0 || ft > 3.5) return;
    // 上升阶段
    if(ft < 0.6) {
      const rp = ft/0.6;
      const trailX = fw.cx;
      const trailY = H*0.7 - rp*(H*0.7 - fw.cy);
      ctx.fillStyle = fw.colors[0];
      ctx.fillRect(Math.round(trailX/PX)*PX, Math.round(trailY/PX)*PX, PX*2, PX*3);
      // 轨迹
      for(let i=1;i<4;i++) {
        ctx.globalAlpha = 0.4-i*0.1;
        ctx.fillRect(Math.round(trailX/PX)*PX, Math.round((trailY+i*8)/PX)*PX, PX*2, PX*2);
      }
      ctx.globalAlpha = 1;
    } else {
      // 爆炸阶段
      const ep = Math.min((ft-0.6)/1.2, 1);
      const maxR = 80 + Math.random()*10;
      const numParts = 20;
      for(let i=0;i<numParts;i++) {
        const ang = (i/numParts)*Math.PI*2;
        const speed = (0.5 + (i%3)*0.25) * maxR;
        const px = fw.cx + Math.cos(ang)*speed*ep;
        const py = fw.cy + Math.sin(ang)*speed*ep + ep*ep*30; // 重力
        const a = Math.max(0, 1-ep*1.2);
        ctx.globalAlpha = a;
        ctx.fillStyle = fw.colors[i%fw.colors.length];
        ctx.fillRect(Math.round(px/PX)*PX, Math.round(py/PX)*PX, PX*2, PX*2);
        // 尾迹
        for(let j=1;j<3;j++) {
          const tp = ep - j*0.1;
          if(tp>0) {
            const tpx = fw.cx + Math.cos(ang)*speed*tp;
            const tpy = fw.cy + Math.sin(ang)*speed*tp + tp*tp*30;
            ctx.globalAlpha = a*0.3;
            ctx.fillRect(Math.round(tpx/PX)*PX, Math.round(tpy/PX)*PX, PX, PX);
          }
        }
        ctx.globalAlpha = 1;
      }
      // 中心光晕
      if(ep < 0.3) {
        const glowA = (0.3-ep)/0.3*0.6;
        ctx.fillStyle = `rgba(255,255,255,${glowA})`;
        ctx.beginPath();
        ctx.arc(fw.cx, fw.cy, (1-ep)*30, 0, Math.PI*2);
        ctx.fill();
      }
    }
  });

  // 文字逐字浮现
  const msg = '祝王珏小朋友生日快乐！';
  const chars = msg.split('');
  const textStartT = 1.5;
  if(t > textStartT) {
    const textT = t - textStartT;
    // 背景光条
    const textAlpha = Math.min(textT/1.0, 1);
    ctx.fillStyle = `rgba(0,0,20,${textAlpha*0.7})`;
    ctx.fillRect(W/2-240, H/2-18, 480, 54);

    ctx.textAlign = 'center';
    const charCount = Math.floor(textT / 0.25);
    for(let i=0; i<Math.min(charCount, chars.length); i++) {
      const cx3 = W/2 - (chars.length-1)*18 + i*36;
      // 每个字单独淡入
      const ca = Math.min((textT - i*0.25)/0.3, 1);
      ctx.globalAlpha = ca;
      // 描边
      ctx.strokeStyle = '#2233aa';
      ctx.lineWidth = 3;
      ctx.font = 'bold 28px "Microsoft YaHei", sans-serif';
      ctx.strokeText(chars[i], cx3, H/2+14);
      // 填色（金色）
      ctx.fillStyle = '#ffd700';
      ctx.fillText(chars[i], cx3, H/2+14);
      ctx.globalAlpha = 1;
    }
  }

  // 淡出
  if(t > 10) {
    ctx.fillStyle = `rgba(0,0,0,${Math.min((t-10)/1.5, 1)})`;
    ctx.fillRect(0,0,W,H);
  }

  SUB.textContent = t > textStartT ? '🎂 祝王珏小朋友生日快乐！' : '烟花绽放...';
}

// ===== 主循环 =====
// 场景时间节点（累计秒数）
const SCENES = [
  { dur: 2,    fn: scene01 },  // 镜头1  0~2s
  { dur: 3,    fn: scene02 },  // 镜头2  2~5s
  { dur: 2,    fn: scene03 },  // 镜头3  5~7s
  { dur: 3,    fn: scene04 },  // 镜头4  7~10s
  { dur: 2,    fn: scene05 },  // 镜头5  10~12s
  { dur: 3,    fn: scene06 },  // 镜头6  12~15s
  { dur: 1.5,  fn: scene07 },  // 镜头7  15~16.5s
  { dur: 3,    fn: scene08 },  // 镜头8  16.5~19.5s
  { dur: 2,    fn: scene09 },  // 镜头9  19.5~21.5s
  { dur: 4,    fn: scene10 },  // 镜头10 21.5~25.5s
  { dur: 11.5, fn: scene11 },  // 镜头11 25.5~37s
];

// 计算累计时间
let cumTime = 0;
SCENES.forEach(s => { s.start = cumTime; cumTime += s.dur; });
const TOTAL = cumTime;

let startTime = null;
let animId = null;

function loop(ts) {
  if(!startTime) startTime = ts;
  const elapsed = (ts - startTime) / 1000;

  if(elapsed >= TOTAL) {
    // 结束后重播
    startTime = ts;
    animId = requestAnimationFrame(loop);
    return;
  }

  // 找当前场景
  let currentScene = SCENES[SCENES.length-1];
  for(let i=0; i<SCENES.length; i++) {
    if(elapsed < SCENES[i].start + SCENES[i].dur) {
      currentScene = SCENES[i];
      break;
    }
  }

  const sceneT = elapsed - currentScene.start;

  // 场景切换黑帧（0.08s）
  const isTransition = sceneT < 0.08;

  if(isTransition) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,W,H);
    SUB.textContent = '';
  } else {
    ctx.clearRect(0,0,W,H);
    currentScene.fn(sceneT - 0.08);
  }

  animId = requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
